<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones - Taquerías El Paisa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <!-- Botón Volver -->
    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Volver al Inicio
    </a>

    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo">
                <div class="logo-circle">
                    <i class="fas fa-pepper-hot"></i>
                </div>
                <div class="logo-text">
                    <div>Taquerías</div>
                    <div>El Paisa</div>
                </div>
            </div>

            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="menu.html">Menú</a>
                <a href="promociones-del-dia.html">Promocionesc del dia</a>
                <a href="mas-pedidos.html">Más Pedidos</a>
                <a href="combos-familiares.html">Combos Familiares</a>
            </div>

            <div class="nav-icons">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar promociones...">
                </div>
                <i class="fas fa-user"></i>
                <div onclick="window.location.href='carrito.html'" class="cart-icon">
                    <i class="fas fa-shopping-cart" style="font-size: 1.6rem;"></i>
                    <span class="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <!-- PROMOCIONES -->
    <section class="menu-section">
        <h2 class="section-title">🔥 Promociones Todos los jueves </h2>
        <div class="menu-grid" id="promociones-grid"></div>
    </section>

    <script src="cart.js"></script>
    <script>
        const promociones = [
            {
                name: "Combo Paisa Familiar",
                desc: "4 tacos + 2 bebidas grandes + guacamole",
                price: "$149",
              
                img: "4 tacos.jpg"
            },
            {
                name: "Martes de Tacos al Pastor",
                desc: "Todos los tacos al pastor a mitad de precio",
                price: "$13 c/u",
              
                img: "pastor.jpg"
            },
            {
                name: "Quesadilla Gigante + Refresco",
                desc: "Quesadilla grande + horchata o jamaica",
                price: "$89",
                
                img: "Quesadilla grande + horchata o jamaica.jpg"
            },
            {
                name: "Burrito El Paisa + Papas",
                desc: "Burrito gigante + papas fritas",
                price: "$95",
               
                img: "Burrito gigante + papas fritas.jpg"
            },
            {
                name: "2x1 en Cervezas",
                desc: "Corona o Modelo todos los jueves",
                price: "$35",
              
                img: "Corona o Modelo.jpg"
            },
            {
                name: "Plato El Paisa Completo",
                desc: "Carne asada, arroz, frijoles, taco y ensalada",
                price: "$89",
               
                img: "carne.jpg"
            },
            {
                name: "Nachos Supremos",
                desc: "Nachos con carne, queso, guacamole y crema",
                price: "$69",
                
                img: "Nachos con carne, queso, guacamole y crema.jpg"
            },
            {
                name: "Torta Ahogada + Refresco",
                desc: "Torta ahogada en salsa + bebida",
                price: "$65",
                
                img: "Torta ahogada en salsa + bebida.jpg"
            }
        ];

        function createPromoCard(item) {
            return `
                <div class="menu-card promo-card">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="menu-card-content">
                        <span class="discount-badge">¡Oferta!</span>
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <div class="price-container">
                            <span class="price">${item.price}</span>
                            ${item.oldPrice ? `<span class="old-price">${item.oldPrice}</span>` : ''}
                        </div>
                        <button onclick="addToCart('${item.name}', '${item.price}', '${item.img}')" class="add-to-cart-btn">
                            Agregar al carrito
                        </button>
                    </div>
                </div>
            `;
        }

        document.getElementById('promociones-grid').innerHTML = promociones.map(createPromoCard).join('');
    </script>

</body>
</html>
